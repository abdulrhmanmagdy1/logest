# ================================================================
# Edham Logistics — Production Docker Compose
# Target:  Hetzner CX32  (4 vCPU · 8 GB RAM · 80 GB SSD)
# Stack:   Next.js 14 · Node.js 20 · MongoDB 7 · Redis 7 · Nginx
# Launch:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ================================================================

name: edham-prod

services:

  # ────────────────────────────────────────────────────────────
  # MongoDB 7  —  internal only, never exposed to the internet
  # ────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: edham-mongo-prod
    restart: always
    # Limit WiredTiger cache to 1 GB to protect the 8 GB VPS
    command: mongod --auth --wiredTigerCacheSizeGB 1
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: edham_logistics
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - edham-internal
    # NO ports: block — databases must never be reachable from outside
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ────────────────────────────────────────────────────────────
  # Redis 7  —  password-protected, AOF persistence, LRU eviction
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edham-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --bind 0.0.0.0
    volumes:
      - redis_data:/data
    networks:
      - edham-internal
    # NO ports: block — cache must never be reachable from outside
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────
  # Node.js Backend  —  built from root Dockerfile
  # ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: edham-backend:prod
    container_name: edham-backend-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      # Compose auto-injects credentials from .env.prod
      MONGODB_URI: >-
        mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/edham_logistics?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      CLIENT_URL: ${CLIENT_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@edham.com}
      FROM_NAME: ${FROM_NAME:-Edham Logistics}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      MAINTENANCE_ALERT_DAYS: ${MAINTENANCE_ALERT_DAYS:-7}
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edham-internal
    # NO ports: — nginx is the only public gateway
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:5000/api/v1/health',r=>r.statusCode===200?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ────────────────────────────────────────────────────────────
  # Next.js 14 Frontend  —  standalone output, minimal image
  # NEXT_PUBLIC_* vars must be passed at BUILD TIME (baked into bundle)
  # ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY:-}
    image: edham-frontend:prod
    container_name: edham-frontend-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edham-internal
    # NO ports: — nginx proxies / → frontend:3000
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000',r=>r.statusCode<500?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  # ────────────────────────────────────────────────────────────
  # Nginx  —  the ONLY public gateway (ports 80 + 443)
  # Mounts /etc/letsencrypt and /var/www/certbot from the HOST
  # so that certbot (installed on host) can write certs that
  # nginx reads without needing a container restart.
  # ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: edham-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro          # our config
      - /var/www/certbot:/var/www/certbot:ro            # ACME webroot
      - /etc/letsencrypt:/etc/letsencrypt:ro            # SSL certs
      - nginx_logs:/var/log/nginx                       # access + error logs
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - edham-internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

# ── Named Volumes (data survives container restarts/rebuilds) ──
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local
  nginx_logs:
    driver: local

# ── Internal Bridge Network (databases never on host network) ─
networks:
  edham-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
