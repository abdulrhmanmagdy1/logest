name: edham_logistics
description: Integrated Cold Chain Logistics Management System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.10
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  salomon_bottom_bar: ^3.3.2
  animate_do: ^3.3.4
  sleek_circular_slider: ^2.0.1
  fl_chart: ^0.68.0
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^12.1.1
  
  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_polyline_points: ^2.0.0
  
  # firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  
  # Utils
  intl: ^0.18.1
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  permission_handler: ^11.1.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  get_it: ^7.6.7
  injectable: ^2.3.2
  connectivity_plus: ^5.0.2
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.3.1
  socket_io_client: ^2.0.3
  
  # Authentication & Security
  local_auth: ^2.2.0
  local_auth_android: ^1.0.36
  local_auth_darwin: ^1.3.1
  
  # Payment Integration
  # stripe_payment: ^1.1.4  # Uncomment when needed

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  retrofit_generator: ^8.0.6
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
