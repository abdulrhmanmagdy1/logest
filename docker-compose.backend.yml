# ============================================
# Edham Logistics — Backend Dev Compose
# Full stack: backend API + MongoDB + Redis
# NO source-code bind mounts (uses built image)
# NO hardcoded credentials (env var refs only)
# ============================================

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edham-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:?err}@mongo:27017/edham_logistics?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-}
      - AZURE_STORAGE_CONTAINER_NAME=${AZURE_STORAGE_CONTAINER_NAME:-uploads}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    volumes:
      - backend_logs:/app/logs
      # NO source-code bind mount — image is immutable
    depends_on:
      - mongo
      - redis
    networks:
      - edham-network

  mongo:
    image: mongo:6-jammy
    container_name: edham-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD must be set}
    volumes:
      - mongo_data:/data/db
    networks:
      - edham-network

  redis:
    image: redis:7-alpine
    container_name: edham-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - edham-network

volumes:
  mongo_data:
  redis_data:
  backend_logs:

networks:
  edham-network:
    driver: bridge
