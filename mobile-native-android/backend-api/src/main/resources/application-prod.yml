# Production Configuration
spring:
  # Database Configuration
  datasource:
    url: jdbc:postgresql://postgres:5432/edham_logistics
    username: edham_user
    password: edham_password_123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: false
          use_query_cache: false
  
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:${EDHAM_REDIS_PASSWORD}}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms
  
  # Security Configuration
  security:
    jwt:
      secret: ${JWT_SECRET:${EDHAM_JWT_SECRET}}
      access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
      refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:86400000}
  
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  http2:
    enabled: true
  error:
    whitelabel:
      enabled: false

# Logging Configuration
logging:
  level:
    com.edham.logistics: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/edham-logistics/application.log
    max-size: 100MB
    max-history: 30

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Application Configuration
app:
  name: Edham Logistics Backend
  version: 2.0.0
  environment: production
  
  # CORS Configuration
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://edham-logistics.com,https://app.edham-logistics.com}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
  
  # File Storage Configuration
  storage:
    type: ${STORAGE_TYPE:s3}
    s3:
      bucket: ${S3_BUCKET:edham-logistics-files}
      region: ${AWS_REGION:us-east-1}
      access-key: ${AWS_ACCESS_KEY:${EDHAM_AWS_ACCESS_KEY}}
      secret-key: ${AWS_SECRET_KEY:${EDHAM_AWS_SECRET_KEY}}
      endpoint: ${S3_ENDPOINT:https://s3.amazonaws.com}
    local:
      upload-dir: ${UPLOAD_DIR:/var/lib/edham-logistics/uploads}
  
  # Email Configuration
  email:
    enabled: true
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:${EDHAM_EMAIL_USERNAME}}
    password: ${EMAIL_PASSWORD:${EDHAM_EMAIL_PASSWORD}}
    from: ${EMAIL_FROM:noreply@edham-logistics.com}
    
  # SMS Configuration
  sms:
    enabled: true
    provider: ${SMS_PROVIDER:twilio}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:${EDHAM_TWILIO_ACCOUNT_SID}}
      auth-token: ${TWILIO_AUTH_TOKEN:${EDHAM_TWILIO_AUTH_TOKEN}}
      from-number: ${TWILIO_FROM_NUMBER:${EDHAM_TWILIO_FROM_NUMBER}}
  
  # Push Notification Configuration
  push:
    firebase:
      server-key: ${FIREBASE_SERVER_KEY:${EDHAM_FIREBASE_SERVER_KEY}}
      api-url: https://fcm.googleapis.com/fcm/send
  
  # Payment Configuration
  payment:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:${EDHAM_STRIPE_SECRET_KEY}}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:${EDHAM_STRIPE_WEBHOOK_SECRET}}
      publishable-key: ${STRIPE_PUBLISHABLE_KEY:${EDHAM_STRIPE_PUBLISHABLE_KEY}}
  
  # Analytics Configuration
  analytics:
    google:
      tracking-id: ${GA_TRACKING_ID:${EDHAM_GA_TRACKING_ID}}
  
  # Backup Configuration
  backup:
    enabled: true
    schedule: ${BACKUP_SCHEDULE:0 2 * * *}  # Daily at 2 AM
    retention-days: ${BACKUP_RETENTION_DAYS:30}
    storage-type: ${BACKUP_STORAGE_TYPE:s3}
    s3-bucket: ${BACKUP_S3_BUCKET:edham-logistics-backups}

# Performance Configuration
performance:
  cache:
    default-ttl: ${CACHE_DEFAULT_TTL:3600}
    max-size: ${CACHE_MAX_SIZE:1000}
  
  rate-limiting:
    enabled: true
    requests-per-minute: ${RATE_LIMIT_RPM:100}
    burst-capacity: ${RATE_LIMIT_BURST:200}
  
  connection-pool:
    max-total: ${POOL_MAX_TOTAL:200}
    default-max-per-route: ${POOL_MAX_PER_ROUTE:50}
    connect-timeout: ${POOL_CONNECT_TIMEOUT:5000}
    socket-timeout: ${POOL_SOCKET_TIMEOUT:10000}

# Security Configuration
security:
  ssl:
    enabled: true
    keystore-path: ${SSL_KEYSTORE_PATH:/etc/ssl/certs/edham-logistics.jks}
    keystore-password: ${SSL_KEYSTORE_PASSWORD:${EDHAM_SSL_KEYSTORE_PASSWORD}}
    key-password: ${SSL_KEY_PASSWORD:${EDHAM_SSL_KEY_PASSWORD}}
  
  encryption:
    key: ${ENCRYPTION_KEY:${EDHAM_ENCRYPTION_KEY}}
    algorithm: AES-256-GCM
  
  session:
    timeout: ${SESSION_TIMEOUT:1800}  # 30 minutes
    max-concurrent-sessions: ${MAX_CONCURRENT_SESSIONS:3}

# Monitoring Configuration
monitoring:
  metrics:
    enabled: true
    jvm:
      enabled: true
    system:
      enabled: true
    custom:
      enabled: true
  
  health-checks:
    database:
      enabled: true
      timeout: 5000
    redis:
      enabled: true
      timeout: 3000
    external-services:
      enabled: true
      timeout: 10000

# Feature Flags
features:
  real-time-tracking: ${FEATURE_REAL_TIME_TRACKING:true}
  advanced-analytics: ${FEATURE_ADVANCED_ANALYTICS:true}
  multi-tenant: ${FEATURE_MULTI_TENANT:false}
  api-versioning: ${FEATURE_API_VERSIONING:true}
  audit-logging: ${FEATURE_AUDIT_LOGGING:true}
  backup-automation: ${FEATURE_BACKUP_AUTOMATION:true}

# External Service Configuration
external-services:
  maps:
    provider: ${MAPS_PROVIDER:google}
    google:
      api-key: ${GOOGLE_MAPS_API_KEY:${EDHAM_GOOGLE_MAPS_API_KEY}}
  
  weather:
    provider: ${WEATHER_PROVIDER:openweathermap}
    api-key: ${WEATHER_API_KEY:${EDHAM_WEATHER_API_KEY}}
  
  geocoding:
    provider: ${GEOCODING_PROVIDER:google}
    api-key: ${GEOCODING_API_KEY:${EDHAM_GEOCODING_API_KEY}}
