# Edham Logistics Backend - Prometheus Alert Rules
# Alerting rules for monitoring the backend application

groups:
  - name: edham-logistics-backend.rules
    rules:
      # High HTTP error rate
      - alert: HighHTTPErrorRate
        expr: rate(http_requests_total{application="edham-logistics-backend",status=~"5.."}[5m]) / rate(http_requests_total{application="edham-logistics-backend"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "High HTTP error rate detected"
          description: "HTTP error rate is {{ $value | humanizePercentage }} for the last 5 minutes"

      # High HTTP 4xx rate
      - alert: HighHTTP4xxRate
        expr: rate(http_requests_total{application="edham-logistics-backend",status=~"4.."}[5m]) / rate(http_requests_total{application="edham-logistics-backend"}[5m]) > 0.10
        for: 5m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "High HTTP 4xx rate detected"
          description: "HTTP 4xx rate is {{ $value | humanizePercentage }} for the last 5 minutes"

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{application="edham-logistics-backend"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s for the last 5 minutes"

      # Very high response time
      - alert: VeryHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{application="edham-logistics-backend"}[5m])) > 5
        for: 2m
        labels:
          severity: critical
          service: edham-backend
        annotations:
          summary: "Very high response time detected"
          description: "95th percentile response time is {{ $value }}s for the last 5 minutes"

      # Application down
      - alert: ApplicationDown
        expr: up{job="edham-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: edham-backend
        annotations:
          summary: "Edham Logistics Backend is down"
          description: "The backend application has been down for more than 1 minute"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (jvm_memory_used_bytes{application="edham-logistics-backend"} / jvm_memory_max_bytes{application="edham-logistics-backend"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% for more than 5 minutes"

      # Critical memory usage
      - alert: CriticalMemoryUsage
        expr: (jvm_memory_used_bytes{application="edham-logistics-backend"} / jvm_memory_max_bytes{application="edham-logistics-backend"}) * 100 > 95
        for: 2m
        labels:
          severity: critical
          service: edham-backend
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is {{ $value }}% for more than 2 minutes"

      # High CPU usage
      - alert: HighCPUUsage
        expr: system_cpu_usage{application="edham-logistics-backend"} * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% for more than 5 minutes"

      # Critical CPU usage
      - alert: CriticalCPUUsage
        expr: system_cpu_usage{application="edham-logistics-backend"} * 100 > 95
        for: 2m
        labels:
          severity: critical
          service: edham-backend
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is {{ $value }}% for more than 2 minutes"

      # High GC time
      - alert: HighGCTime
        expr: rate(jvm_gc_collection_seconds_sum{application="edham-logistics-backend"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "High GC time detected"
          description: "GC time is {{ $value }}s/s for the last 5 minutes"

      # Database connection issues
      - alert: DatabaseConnectionIssues
        expr: hikaricp_connections_active{application="edham-logistics-backend"} / hikaricp_connections_max{application="edham-logistics-backend"} > 0.9
        for: 2m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connection pool usage is {{ $value | humanizePercentage }}"

      # Database connection exhausted
      - alert: DatabaseConnectionExhausted
        expr: hikaricp_connections_active{application="edham-logistics-backend"} == hikaricp_connections_max{application="edham-logistics-backend"}
        for: 1m
        labels:
          severity: critical
          service: edham-backend
        annotations:
          summary: "Database connection pool exhausted"
          description: "All database connections are in use"

      # Redis connection issues
      - alert: RedisConnectionIssues
        expr: redis_connected_clients{instance="redis:6379"} > 100
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "High Redis connection count"
          description: "Redis has {{ $value }} connected clients"

      # Low disk space
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Low disk space"
          description: "Only {{ $value | humanizePercentage }} disk space remaining"

      # Application-specific alerts
      - alert: NoNewShipments
        expr: increase(shipments_created_total{application="edham-logistics-backend"}[1h]) == 0
        for: 2h
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "No new shipments created"
          description: "No new shipments have been created in the last 2 hours"

      - alert: HighFailedLogins
        expr: rate(auth_login_failed_total{application="edham-logistics-backend"}[5m]) > 5
        for: 2m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "High failed login rate"
          description: "Failed login rate is {{ $value }} per second"

      - alert: PaymentProcessingIssues
        expr: rate(payment_processing_failed_total{application="edham-logistics-backend"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "Payment processing issues detected"
          description: "Payment processing failure rate is {{ $value }} per second"

      # WebSocket connection issues
      - alert: WebSocketConnectionIssues
        expr: websocket_connections_active{application="edham-logistics-backend"} < 1
        for: 10m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "No active WebSocket connections"
          description: "No active WebSocket connections for the last 10 minutes"

      # File upload issues
      - alert: FileUploadIssues
        expr: rate(file_upload_failed_total{application="edham-logistics-backend"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "File upload issues detected"
          description: "File upload failure rate is {{ $value }} per second"

      # Notification delivery issues
      - alert: NotificationDeliveryIssues
        expr: rate(notification_delivery_failed_total{application="edham-logistics-backend"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: edham-backend
        annotations:
          summary: "Notification delivery issues detected"
          description: "Notification delivery failure rate is {{ $value }} per second"

  - name: edham-logistics-business.rules
    rules:
      # Business metrics alerts
      - alert: LowShipmentCompletionRate
        expr: (rate(shipments_completed_total{application="edham-logistics-backend"}[24h]) / rate(shipments_created_total{application="edham-logistics-backend"}[24h])) * 100 < 80
        for: 1h
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Low shipment completion rate"
          description: "Shipment completion rate is {{ $value | humanizePercentage }} in the last 24 hours"

      - alert: HighShipmentDelayRate
        expr: (rate(shipments_delayed_total{application="edham-logistics-backend"}[24h]) / rate(shipments_created_total{application="edham-logistics-backend"}[24h])) * 100 > 20
        for: 2h
        labels:
          severity: warning
          service: business
        annotations:
          summary: "High shipment delay rate"
          description: "Shipment delay rate is {{ $value | humanizePercentage }} in the last 24 hours"

      - alert: LowRevenueGeneration
        expr: increase(revenue_total{application="edham-logistics-backend"}[24h]) < 1000
        for: 6h
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Low revenue generation"
          description: "Revenue generated in the last 24 hours is ${{ $value }}"

      - alert: HighCustomerComplaintRate
        expr: (rate(customer_complaints_total{application="edham-logistics-backend"}[24h]) / rate(shipments_delivered_total{application="edham-logistics-backend"}[24h])) * 100 > 5
        for: 4h
        labels:
          severity: warning
          service: business
        annotations:
          summary: "High customer complaint rate"
          description: "Customer complaint rate is {{ $value | humanizePercentage }} in the last 24 hours"

      - alert: DriverUtilizationTooLow
        expr: (active_drivers_total{application="edham-logistics-backend"} / total_drivers_total{application="edham-logistics-backend"}) * 100 < 50
        for: 1h
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Low driver utilization"
          description: "Driver utilization rate is {{ $value | humanizePercentage }}"

      - alert: VehicleMaintenanceOverdue
        expr: increase(vehicle_maintenance_overdue_total{application="edham-logistics-backend"}[24h]) > 5
        for: 1h
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Multiple vehicles overdue for maintenance"
          description: "{{ $value }} vehicles are overdue for maintenance"

      - alert: InvoicePaymentDelay
        expr: (rate(invoices_overdue_total{application="edham-logistics-backend"}[24h]) / rate(invoices_created_total{application="edham-logistics-backend"}[24h])) * 100 > 15
        for: 2h
        labels:
          severity: warning
          service: business
        annotations:
          summary: "High invoice payment delay rate"
          description: "Invoice payment delay rate is {{ $value | humanizePercentage }} in the last 24 hours"
