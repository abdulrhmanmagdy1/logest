# Edham Logistics Backend - Grafana Prometheus Datasource Configuration
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "5s"
      queryTimeout: "60s"
      httpMethod: POST
    secureJsonData: {}
    
  - name: Edham Backend Metrics
    type: prometheus
    access: proxy
    url: http://backend:8080/actuator/prometheus
    isDefault: false
    editable: true
    jsonData:
      timeInterval: "10s"
      queryTimeout: "30s"
      httpMethod: POST
    secureJsonData: {}
