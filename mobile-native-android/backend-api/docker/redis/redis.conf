# Edham Logistics Backend - Redis Configuration
# Optimized for production use with persistence and security

# Network settings
bind 0.0.0.0
port 6379
protected-mode yes

# Security
# Set your password in docker-compose.yml
# requirepass your_redis_password_here

# General settings
daemonize no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""

# Database configuration
databases 16

# Persistence settings
save 900 1      # Save if at least 1 key changed in 900 seconds
save 300 10     # Save if at least 10 keys changed in 300 seconds
save 60 10000   # Save if at least 10000 keys changed in 60 seconds

# RDB settings
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Lazy freeing
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no
lazyfree-lazy-user-del no

# Timeout settings
timeout 300
tcp-keepalive 300
tcp-backlog 511

# Client settings
maxclients 10000

# Slow log configuration
slowlog-log-slower-than 10000
slowlog-max-len 128

# Event notification (notify-keyspace-events)
# Uncomment if you need key space notifications
# notify-keyspace-events "Ex"

# Advanced memory optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client query buffer limits
client-query-buffer-limit 1gb

# Protocol settings
proto-max-bulk-len 512mb

# Frequency of rehashing
hz 10

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB save incremental fsync
rdb-save-incremental-fsync yes

# TLS settings (uncomment if using TLS)
# port 0
# tls-port 6379
# tls-cert-file /path/to/redis.crt
# tls-key-file /path/to/redis.key
# tls-ca-cert-file /path/to/ca.crt

# Modules (load if needed)
# loadmodule /path/to/redis-modules.so

# Other settings
# replica-announce-ip 192.168.1.1
# replica-announce-port 6379
# replica-announce-tls-port 6380
