# Development Configuration
spring:
  # Database Configuration (PostgreSQL via Docker)
  datasource:
    url: jdbc:postgresql://localhost:5432/edham_logistics
    username: edham_user
    password: edham_password_123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
  
  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 2000ms
  
  # Disable Flyway to avoid circular dependency
  flyway:
    enabled: false
  
  # Security Configuration
  security:
    jwt:
      secret: dev_jwt_secret_key_123456789012345678901234567890
      access-token-expiration: 3600000  # 1 hour
      refresh-token-expiration: 86400000  # 24 hours
  
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Server Configuration
server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  error:
    whitelabel:
      enabled: false

# Logging Configuration
logging:
  level:
    com.edham.logistics: DEBUG
    org.springframework.security: DEBUG
    org.hibernate: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/edham-logistics-dev.log
    max-size: 50MB
    max-history: 10

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Application Configuration
app:
  name: Edham Logistics Backend
  version: 2.0.0
  environment: development
  
  # CORS Configuration
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8081,http://127.0.0.1:3000
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
  
  # File Storage Configuration
  storage:
    type: local
    local:
      upload-dir: ./uploads/dev
  
  # Email Configuration (Development - use mailhog or similar)
  email:
    enabled: false
    host: localhost
    port: 1025
    username: ""
    password: ""
    from: dev@edham-logistics.com
    
  # SMS Configuration (Development - disabled)
  sms:
    enabled: false
    provider: mock
    twilio:
      account-sid: ""
      auth-token: ""
      from-number: ""
  
  # Push Notification Configuration (Development - disabled)
  push:
    firebase:
      server-key: ""
      api-url: https://fcm.googleapis.com/fcm/send
  
  # Payment Configuration (Development - test keys)
  payment:
    stripe:
      secret-key: sk_test_1234567890abcdef
      webhook-secret: whsec_1234567890abcdef
      publishable-key: pk_test_1234567890abcdef
  
  # Analytics Configuration (Development - disabled)
  analytics:
    google:
      tracking-id: ""
  
  # Backup Configuration (Development - disabled)
  backup:
    enabled: false
    schedule: "0 2 * * *"
    retention-days: 7
    storage-type: local
    local-backup-dir: ./backups/dev

# Performance Configuration
performance:
  cache:
    default-ttl: 300  # 5 minutes
    max-size: 100
  
  rate-limiting:
    enabled: false
    requests-per-minute: 1000
    burst-capacity: 2000
  
  connection-pool:
    max-total: 50
    default-max-per-route: 20
    connect-timeout: 5000
    socket-timeout: 10000

# Security Configuration
security:
  ssl:
    enabled: false
  
  encryption:
    key: dev_encryption_key_123456789012345678901234
    algorithm: AES-256-GCM
  
  session:
    timeout: 3600  # 1 hour
    max-concurrent-sessions: 10

# Monitoring Configuration
monitoring:
  metrics:
    enabled: true
    jvm:
      enabled: true
    system:
      enabled: true
    custom:
      enabled: true
  
  health-checks:
    database:
      enabled: true
      timeout: 5000
    redis:
      enabled: true
      timeout: 3000
    external-services:
      enabled: false
      timeout: 10000

# Feature Flags
features:
  real-time-tracking: true
  advanced-analytics: false
  multi-tenant: false
  api-versioning: true
  audit-logging: true
  backup-automation: false

# External Service Configuration
external-services:
  maps:
    provider: google
    google:
      api-key: ""
  
  weather:
    provider: openweathermap
    api-key: ""
  
  geocoding:
    provider: google
    api-key: ""
