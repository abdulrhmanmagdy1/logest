# Spring Boot Application Configuration
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  application:
    name: edham-logistics-backend
  
  # Banner Configuration
  banner:
    location: classpath:banner.txt
  
  # Internationalization
  messages:
    basename: i18n/messages
    encoding: UTF-8
    cache-duration: 3600
  
  # Time Zone Configuration
  jackson:
    time-zone: UTC
    locale: en_US

# Application Metadata
info:
  app:
    name: Edham Logistics Backend
    description: Scalable backend system for Edham Logistics Android application
    version: 2.0.0
    author: Edham Logistics Team
    contact: info@edham-logistics.com
    documentation: https://docs.edham-logistics.com
    
  build:
    timestamp: ${maven.build.timestamp}
    version: ${project.version}
    artifact: ${project.artifactId}
    group: ${project.groupId}
    
  git:
    branch: ${git.branch:unknown}
    commit: ${git.commit.id:unknown}
    commit-time: ${git.commit.time:unknown}

# Actuator Configuration
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus,env,configprops,beans,mappings
  
  endpoint:
    health:
      show-details: when_authorized
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
    env:
      enabled: true
      show-values: when_authorized
    configprops:
      enabled: true
      show-values: when_authorized
    beans:
      enabled: true
    mappings:
      enabled: true
  
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.75,0.95,0.99
      sla:
        http.server.requests: 100ms,200ms,500ms,1s,2s,5s
    tags:
      application: ${spring.application.name}
      environment: ${app.environment:local}

# Server Configuration
server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    max-connections: 8192
    accept-count: 100
    connection-timeout: 20000
    max-http-post-size: 10485760
    max-swallow-size: 10485760

# Logging Configuration
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} ${LOG_LEVEL_PATTERN:-%5p} ${PID:- } --- [%t] %-40.40logger{39} : %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 1GB

# Application Configuration
app:
  # Application Metadata
  name: Edham Logistics Backend
  version: 2.0.0
  environment: ${SPRING_PROFILES_ACTIVE:local}
  
  # API Configuration
  api:
    version: v1
    base-path: /api/${app.api.version}
    documentation-path: ${app.api.base-path}/docs
    swagger-path: ${app.api.base-path}/swagger-ui.html
    
  # Security Configuration
  security:
    jwt:
      header-name: Authorization
      token-prefix: "Bearer "
      refresh-token-cookie-name: refresh_token
      access-token-cookie-name: access_token
    
    password:
      min-length: 8
      require-uppercase: true
      require-lowercase: true
      require-digit: true
      require-special: true
    
    session:
      timeout: 1800  # 30 minutes
      max-concurrent: 3
    
    rate-limiting:
      enabled: true
      requests-per-minute: 60
      burst-capacity: 120
    
    cors:
      max-age: 3600
      allow-credentials: true
  
  # File Configuration
  file:
    max-upload-size: 10MB
    allowed-types: 
      - image/jpeg
      - image/png
      - image/gif
      - application/pdf
      - text/csv
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    
    storage:
      temp-dir: ${java.io.tmpdir}/edham-logistics
      cleanup-interval: 3600000  # 1 hour
    
  # Notification Configuration
  notification:
    email:
      enabled: true
      async: true
      retry-attempts: 3
      retry-delay: 5000
      
    sms:
      enabled: true
      async: true
      retry-attempts: 3
      retry-delay: 5000
      
    push:
      enabled: true
      async: true
      retry-attempts: 3
      retry-delay: 5000
  
  # Cache Configuration
  cache:
    default-ttl: 3600  # 1 hour
    max-size: 1000
    cleanup-interval: 300000  # 5 minutes
    
    names:
      user-cache: 1800  # 30 minutes
      shipment-cache: 900  # 15 minutes
      tracking-cache: 300  # 5 minutes
      invoice-cache: 1800  # 30 minutes
  
  # Database Configuration
  database:
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000
    leak-detection-threshold: 60000
    
    batch:
      size: 50
      timeout: 30000
    
    query:
      timeout: 30000
      fetch-size: 1000
  
  # Monitoring Configuration
  monitoring:
    metrics:
      enabled: true
      jvm: true
      system: true
      custom: true
    
    health:
      checks:
        database: true
        redis: true
        disk-space: true
        external-services: true
    
    alerts:
      enabled: true
      threshold:
        cpu-usage: 80
        memory-usage: 80
        disk-usage: 85
        response-time: 2000

# External Service Configuration
external:
  services:
    maps:
      timeout: 5000
      retry-attempts: 3
      retry-delay: 1000
    
    weather:
      timeout: 3000
      retry-attempts: 2
      retry-delay: 1000
    
    geocoding:
      timeout: 5000
      retry-attempts: 3
      retry-delay: 1000
    
    payment:
      timeout: 10000
      retry-attempts: 3
      retry-delay: 2000
    
    notification:
      timeout: 5000
      retry-attempts: 3
      retry-delay: 1000

# Feature Flags
features:
  # Core Features
  authentication: true
  authorization: true
  real-time-tracking: true
  file-upload: true
  notifications: true
  
  # Advanced Features
  advanced-analytics: true
  multi-tenant: false
  api-versioning: true
  audit-logging: true
  backup-automation: true
  performance-monitoring: true
  
  # Development Features
  debug-mode: false
  test-data: false
  mock-external-services: false

# Error Handling
error:
  handling:
    include-stacktrace: false
    include-message: always
    log-errors: true
    log-warnings: true
    
    custom-errors:
      - code: USER_NOT_FOUND
        message: User not found
        status: 404
      - code: INVALID_CREDENTIALS
        message: Invalid credentials
        status: 401
      - code: ACCESS_DENIED
        message: Access denied
        status: 403
      - code: RESOURCE_NOT_FOUND
        message: Resource not found
        status: 404
      - code: VALIDATION_ERROR
        message: Validation error
        status: 400
      - code: INTERNAL_SERVER_ERROR
        message: Internal server error
        status: 500

# Integration Configuration
integration:
  # Database Integration
  database:
    migration:
      enabled: true
      locations: classpath:db/migration
    
    backup:
      enabled: true
      schedule: "0 2 * * *"  # Daily at 2 AM
      retention-days: 30
    
    audit:
      enabled: true
      log-changes: true
      log-deletes: true
  
  # Message Queue Integration
  message-queue:
    enabled: false
    type: rabbitmq
    host: localhost
    port: 5672
    username: guest
    password: guest
    
    queues:
      - name: shipment-events
        durable: true
      - name: tracking-updates
        durable: true
      - name: payment-events
        durable: true
  
  # Search Integration
  search:
    enabled: false
    type: elasticsearch
    host: localhost
    port: 9200
    index-prefix: edham-logistics

# Testing Configuration
testing:
  enabled: ${TESTING_ENABLED:false}
  
  test-data:
    users: 100
    shipments: 500
    invoices: 200
    tracking-events: 1000
  
  mock-services:
    external-apis: true
    payment-gateway: true
    notification-services: true
