# ================================================================
# Render Blueprint — Edham Logistics Backend
# Docs: https://render.com/docs/blueprint-spec
#
# Commit this file to your repo. On Render, create a new
# "Blueprint" service and point it at your repository.
# Render reads this file and creates the service automatically.
# ================================================================

services:
  - type: web
    name: edham-backend
    runtime: node
    region: oregon          # Free tier is only available in Oregon
    rootDir: backend        # The Node.js code lives inside /backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    healthCheckPath: /api/v1/health

    envVars:
      - key: NODE_ENV
        value: production

      # ── MongoDB Atlas ──────────────────────────────────────
      # Set this in Render Dashboard → Environment after deploy.
      # Format: mongodb+srv://user:pass@cluster.mongodb.net/edham_logistics
      - key: MONGO_URI
        sync: false         # never auto-sync — you enter this manually

      # ── Authentication ─────────────────────────────────────
      - key: JWT_SECRET
        sync: false         # generate with: openssl rand -hex 64
      - key: JWT_EXPIRE
        value: 7d

      # ── CORS / Client ──────────────────────────────────────
      # Set CLIENT_URL to your Vercel frontend URL after it deploys.
      # Currently open (origin: true) — restrict once you know the URL.
      - key: CLIENT_URL
        sync: false

      # ── Email / SMTP (optional) ────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false

      # ── Logging ────────────────────────────────────────────
      - key: LOG_LEVEL
        value: info
