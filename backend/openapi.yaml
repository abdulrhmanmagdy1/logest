openapi: 3.0.0
info:
  title: Edham Logistics API
  description: |
    # 🚛 Edham Logistics Enterprise API
    
    A comprehensive, enterprise-grade logistics management system API.
    
    ## Features
    - ✅ Multi-tenancy support
    - ✅ Role-based access control (RBAC)
    - ✅ Two-factor authentication (2FA)
    - ✅ Real-time tracking
    - ✅ Advanced analytics & BI
    - ✅ Warehouse management
    - ✅ CRM integration
    - ✅ HR & Payroll
    - ✅ Fleet management
    - ✅ Procurement
    - ✅ Marketing automation
    - ✅ SLA management
    - ✅ Workflow automation
    - ✅ Multi-language support (6 languages)
    - ✅ ERP integrations
    
  version: 1.0.0
  contact:
    name: Edham Logistics Support
    email: api@edham-logistics.com
  license:
    name: Proprietary
    url: https://edham-logistics.com/license

servers:
  - url: https://api.edham-logistics.com/api/v1
    description: Production server
  - url: https://staging-api.edham-logistics.com/api/v1
    description: Staging server
  - url: http://localhost:5000/api/v1
    description: Local development

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Users
    description: User management
  - name: Companies
    description: Multi-tenancy and company management
  - name: Shipments
    description: Shipment tracking and management
  - name: Drivers
    description: Driver management
  - name: Vehicles
    description: Fleet and vehicle management
  - name: Warehouses
    description: Warehouse and inventory management
  - name: CRM
    description: Customer relationship management
  - name: HR
    description: Human resources and payroll
  - name: Finance
    description: Invoicing and payments
  - name: Procurement
    description: Purchase orders and vendors
  - name: Marketing
    description: Campaigns and automation
  - name: Analytics
    description: Reports and business intelligence
  - name: Workflows
    description: Automation and workflows
  - name: SLA
    description: Service level agreements
  - name: Communication
    description: Chat, notifications, and WebRTC
  - name: System
    description: Health checks and system status

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        201:
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/2fa/setup:
    post:
      tags: [Authentication]
      summary: Setup 2FA
      security:
        - BearerAuth: []
      responses:
        200:
          description: 2FA setup initiated

  /shipments:
    get:
      tags: [Shipments]
      summary: Get all shipments
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: List of shipments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentListResponse'

    post:
      tags: [Shipments]
      summary: Create new shipment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentCreateRequest'
      responses:
        201:
          description: Shipment created

  /shipments/{id}:
    get:
      tags: [Shipments]
      summary: Get shipment details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Shipment details

  /shipments/{id}/track:
    get:
      tags: [Shipments]
      summary: Track shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Tracking information

  /drivers:
    get:
      tags: [Drivers]
      summary: Get all drivers
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of drivers

    post:
      tags: [Drivers]
      summary: Add new driver
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverCreateRequest'
      responses:
        201:
          description: Driver created

  /fleet/vehicles:
    get:
      tags: [Vehicles]
      summary: Get fleet vehicles
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of vehicles

    post:
      tags: [Vehicles]
      summary: Add vehicle to fleet
      security:
        - BearerAuth: []
      responses:
        201:
          description: Vehicle added

  /warehouses:
    get:
      tags: [Warehouses]
      summary: Get warehouses
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of warehouses

    post:
      tags: [Warehouses]
      summary: Create warehouse
      security:
        - BearerAuth: []
      responses:
        201:
          description: Warehouse created

  /crm/leads:
    get:
      tags: [CRM]
      summary: Get CRM leads
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of leads

  /hr/employees:
    get:
      tags: [HR]
      summary: Get employees
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of employees

  /invoices:
    get:
      tags: [Finance]
      summary: Get invoices
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of invoices

  /analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Get analytics dashboard
      security:
        - BearerAuth: []
      responses:
        200:
          description: Dashboard data

  /companies/my:
    get:
      tags: [Companies]
      summary: Get current company
      security:
        - BearerAuth: []
      responses:
        200:
          description: Company details

  /workflows:
    get:
      tags: [Workflows]
      summary: Get workflows
      security:
        - BearerAuth: []
      responses:
        200:
          description: List of workflows

  /sla/dashboard:
    get:
      tags: [SLA]
      summary: Get SLA dashboard
      security:
        - BearerAuth: []
      responses:
        200:
          description: SLA metrics

  /health:
    get:
      tags: [System]
      summary: Health check
      responses:
        200:
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                  timestamp:
                    type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for service-to-service authentication

  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - role
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [customer, driver, admin, supervisor, accountant]
        company:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
        company:
          type: string
        isVerified:
          type: boolean

    Shipment:
      type: object
      properties:
        _id:
          type: string
        trackingNumber:
          type: string
        status:
          type: string
          enum: [pending, picked_up, in_transit, out_for_delivery, delivered, cancelled, returned]
        origin:
          $ref: '#/components/schemas/Address'
        destination:
          $ref: '#/components/schemas/Address'
        customer:
          type: string
        driver:
          type: string
        vehicle:
          type: string
        pickupDate:
          type: string
          format: date-time
        estimatedDelivery:
          type: string
          format: date-time
        weight:
          type: number
        value:
          type: number

    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
          default: SA
        coordinates:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number

    ShipmentCreateRequest:
      type: object
      required:
        - origin
        - destination
        - weight
      properties:
        origin:
          $ref: '#/components/schemas/Address'
        destination:
          $ref: '#/components/schemas/Address'
        weight:
          type: number
        dimensions:
          type: object
          properties:
            length:
              type: number
            width:
              type: number
            height:
              type: number
        value:
          type: number
        description:
          type: string
        serviceType:
          type: string
        insurance:
          type: boolean

    ShipmentListResponse:
      type: object
      properties:
        success:
          type: boolean
        count:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Shipment'
        pagination:
          type: object
          properties:
            page:
              type: integer
            pages:
              type: integer
            total:
              type: integer

    DriverCreateRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - phone
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        licenseNumber:
          type: string
        licenseExpiry:
          type: string
          format: date
        vehicleType:
          type: string
        zone:
          type: string

    Error:
      type: object
      properties:
        success:
          type: boolean
          default: false
        message:
          type: string
        error:
          type: string
        code:
          type: integer

  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
