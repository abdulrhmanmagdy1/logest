name: edham_driver
description: إدهام - تطبيق السائق للنقل المبرد
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.3

  # Location & Maps
  location: ^5.0.3
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0

  # File Upload
  image_picker: ^1.0.4
  file_picker: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # Date & Time
  intl: ^0.18.1

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Notifications
  flutter_local_notifications: ^16.3.0
  firebase_messaging: ^14.7.10

  # Background Services
  flutter_background_service: ^5.0.5
  workmanager: ^0.5.1

  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1

  # Charts
  fl_chart: ^0.66.0

  # Utilities
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  permission_handler: ^11.1.0
  connectivity_plus: ^5.0.2

  # Security & Encryption
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Localization
  flutter_localization: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
