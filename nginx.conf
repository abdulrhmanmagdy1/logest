# ================================================================
# Edham Logistics — Production Nginx Configuration
# Mounted as: /etc/nginx/nginx.conf  (replaces the default)
#
# Phase 1 (no SSL yet):  serves on port 80, ACME challenge ready
# Phase 2 (after cert):  uncomment the HTTPS server block below
#                        and add "return 301" redirect in HTTP block
#
# WebSocket timeout 3600s keeps GPS tracking connections alive
# for up to 1 hour without a keepalive ping from the client.
# ================================================================

worker_processes      auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log  warn;

    # ── Core Performance ───────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    reset_timedout_connection on;
    types_hash_max_size 2048;
    server_tokens       off;       # Never reveal nginx version
    client_max_body_size 50m;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout        30s;

    # ── Gzip Compression ───────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ── WebSocket Upgrade Map ──────────────────────────────────
    # Allows the same location block to serve both HTTP and WS.
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    # ── Rate Limiting Zones ────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_zone:10m    rate=120r/m;
    limit_req_zone  $binary_remote_addr zone=auth_zone:10m   rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # ── Upstream: Node.js Backend (port 5000) ─────────────────
    upstream backend_app {
        server    backend:5000;
        keepalive 32;                   # persistent connections to backend
    }

    # ── Upstream: Next.js Frontend (port 3000) ────────────────
    upstream frontend_app {
        server    frontend:3000;
        keepalive 16;
    }

    # ════════════════════════════════════════════════════════════
    # HTTP — Port 80
    # ────────────────────────────────────────────────────────────
    # PHASE 1: serves the app directly (no TLS yet).
    # PHASE 2: after certbot, replace every proxy location block
    # below with a single:   return 301 https://$host$request_uri;
    # Then uncomment the HTTPS server block at the bottom.
    # ════════════════════════════════════════════════════════════
    server {
        listen      80;
        listen      [::]:80;

        # ↓  Replace with your domain after Certbot setup
        server_name _;

        # ── Let's Encrypt ACME Challenge ────────────────────
        # certbot --webroot writes here; nginx serves it so Let's
        # Encrypt can verify domain ownership without stopping nginx.
        location /.well-known/acme-challenge/ {
            root      /var/www/certbot;
            try_files $uri =404;
        }

        # ── Global Security Headers ──────────────────────────
        add_header X-Frame-Options          "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options   "nosniff"                           always;
        add_header X-XSS-Protection         "1; mode=block"                     always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy       "geolocation=(self), camera=()"     always;

        # ── Socket.IO / WebSocket ────────────────────────────
        # CRITICAL GPS TRACKING FIX:
        #   proxy_read_timeout  3600s — connection stays open up to 1 hour
        #   proxy_send_timeout  3600s — prevents server-side close on idle
        #   proxy_buffering off       — real-time data must not be buffered
        #   Upgrade + Connection headers upgrade HTTP → WebSocket protocol
        location /socket.io/ {
            proxy_pass              http://backend_app;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade           $http_upgrade;
            proxy_set_header        Connection        "upgrade";
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            proxy_connect_timeout   10s;
            proxy_buffering         off;
            proxy_cache             off;
            proxy_redirect          off;
        }

        # ── REST API ─────────────────────────────────────────
        # Rate limited: 120 req/min per IP (burst 30 allowed).
        # No buffering on proxy_pass — preserves full URI incl. /api/v1/...
        location /api {
            limit_req  zone=api_zone  burst=30 nodelay;
            limit_conn conn_zone 25;

            proxy_pass              http://backend_app;
            proxy_http_version      1.1;
            proxy_set_header        Connection        "";   # keepalive to upstream
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_read_timeout      60s;
            proxy_send_timeout      60s;
            proxy_connect_timeout   5s;
            proxy_buffer_size       16k;
            proxy_buffers           4 32k;
            proxy_busy_buffers_size 64k;
            proxy_redirect          off;
        }

        # ── Next.js SSR Frontend ─────────────────────────────
        # Includes Connection-upgrade passthrough so Next.js HMR
        # and any client-side WebSocket connections work correctly.
        location / {
            proxy_pass              http://frontend_app;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade           $http_upgrade;
            proxy_set_header        Connection        $connection_upgrade;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_read_timeout      60s;
            proxy_send_timeout      60s;
            proxy_connect_timeout   5s;
            proxy_redirect          off;
        }
    }


    # ════════════════════════════════════════════════════════════
