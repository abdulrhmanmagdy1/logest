# ============================================
# Edham Logistics — Local Development Compose
# Starts MongoDB + Redis for local dev only.
# The backend/frontend are run via npm run dev.
# For production, use docker-compose.azure.yml
# ============================================

services:
  mongodb:
    image: mongo:6.0
    container_name: edham-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD must be set}
      MONGO_INITDB_DATABASE: edham_logistics
    volumes:
      - mongo_data:/data/db
    networks:
      - edham-network

  redis:
    image: redis:7-alpine
    container_name: edham-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - edham-network

volumes:
  mongo_data:
  redis_data:

networks:
  edham-network:
    driver: bridge
