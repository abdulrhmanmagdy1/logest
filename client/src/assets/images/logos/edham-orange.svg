<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="60" cy="60" r="58" fill="#f97316"/>
  
  <!-- Modern Truck Symbol -->
  <g transform="translate(60, 60)">
    <!-- Truck Body -->
    <rect x="-22" y="-10" width="44" height="18" rx="4" fill="#ffffff" stroke="none"/>
    
    <!-- Truck Cabin -->
    <rect x="-12" y="-16" width="18" height="10" rx="2" fill="#ffffff" stroke="none"/>
    
    <!-- Truck Windows -->
    <rect x="-8" y="-14" width="6" height="6" rx="1" fill="#1e3a8a" stroke="none"/>
    
    <!-- Truck Wheels -->
    <circle cx="-16" cy="12" r="3" fill="#ffffff"/>
    <circle cx="16" cy="12" r="3" fill="#ffffff"/>
    
    <!-- Cargo/Package -->
    <rect x="6" y="-12" width="12" height="8" rx="1" fill="#fbbf24" stroke="none"/>
    
    <!-- Speed Lines (Modern Touch) -->
    <path d="M -28 0 L -32 -3 M 28 0 L 32 -3" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M -28 5 L -32 8 M 28 5 L 32 8" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    
    <!-- GPS Signal -->
    <circle cx="0" cy="-20" r="2" fill="#ffffff"/>
    <path d="M 0 -20 L 0 -16 M -3 -20 L -3 -16 M 3 -20 L 3 -16" stroke="#ffffff" stroke-width="1"5" stroke-linecap="round"/>
  </g>
  
  <!-- Arabic Text "إدهام" -->
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">إدهام</text>
  
  <!-- Subtitle "لوجستي" -->
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#ffedd9">لوجستي</text>
</svg>
