<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="60" cy="60" r="58" fill="#10b981"/>
  
  <!-- Eco-Friendly Truck Symbol -->
  <g transform="translate(60, 60)">
    <!-- Truck Body -->
    <rect x="-25" y="-12" width="50" height="20" rx="3" fill="#ffffff" stroke="none"/>
    
    <!-- Truck Cabin -->
    <rect x="-15" y="-18" width="20" height="12" rx="2" fill="#ffffff" stroke="none"/>
    
    <!-- Truck Wheels -->
    <circle cx="-18" cy="10" r="4" fill="#ffffff"/>
    <circle cx="18" cy="10" r="4" fill="#ffffff"/>
    
    <!-- Cargo/Green Box -->
    <rect x="5" y="-15" width="15" height="10" rx="1" fill="#34d399" stroke="none"/>
    
    <!-- Eco Leaves (Green Theme) -->
    <path d="M -30 0 Q -35 -5 -30 0 Q -35 5 L -30 10 Q -35 5 Z" fill="#34d399" opacity="0.8"/>
    <path d="M 30 0 Q 35 -5 30 0 Q 35 5 L 30 10 Q 35 5 Z" fill="#34d399" opacity="0.8"/>
    
    <!-- Logistics Lines -->
    <path d="M -30 0 L -35 -5 M 30 0 L 35 -5" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <path d="M -30 5 L -35 10 M 30 5 L 35 10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Arabic Text "إدهام" -->
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">إدهام</text>
  
  <!-- Subtitle "لوجستي" -->
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#d1fae5">لوجستي</text>
</svg>
