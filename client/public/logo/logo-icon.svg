<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003D5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099D8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#grad-icon)"/>

  <!-- Truck Icon -->
  <g fill="#fff">
    <!-- Truck Body -->
    <rect x="12" y="22" width="27" height="15" rx="2"/>
    <!-- Cabin -->
    <rect x="36" y="18" width="8" height="10" rx="1"/>
    <!-- Wheels -->
    <circle cx="17" cy="40" r="3"/>
    <circle cx="41" cy="40" r="3"/>
    <!-- Container Lines -->
    <line x1="15" y1="27" x2="38" y2="27" stroke="#D4AF37" stroke-width="1"/>
    <line x1="15" y1="32" x2="38" y2="32" stroke="#D4AF37" stroke-width="1"/>
  </g>
</svg>
