<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad)"/>

  <!-- Truck Icon -->
  <g fill="#fff">
    <!-- Truck Body -->
    <rect x="40" y="70" width="85" height="45" rx="5"/>
    <!-- Cabin -->
    <rect x="115" y="60" width="25" height="30" rx="3"/>
    <!-- Wheels -->
    <circle cx="55" cy="120" r="8"/>
    <circle cx="130" cy="120" r="8"/>
    <!-- Container Lines -->
    <line x1="50" y1="85" x2="120" y2="85" stroke="#dc2626" stroke-width="2"/>
    <line x1="50" y1="100" x2="120" y2="100" stroke="#dc2626" stroke-width="2"/>
  </g>

  <!-- Text -->
  <text x="100" y="160" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">
    إدهام
  </text>
</svg>
