<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="600" y="40" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">
    Edham Logistics - System Architecture
  </text>
  
  <!-- Frontend Box -->
  <rect x="50" y="100" width="300" height="200" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="200" y="130" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Frontend</text>
  <text x="200" y="160" font-size="14" fill="#D4AF37" text-anchor="middle">React 18</text>
  <text x="200" y="180" font-size="14" fill="#D4AF37" text-anchor="middle">TailwindCSS</text>
  <text x="200" y="200" font-size="14" fill="#D4AF37" text-anchor="middle">Socket.IO Client</text>
  <text x="200" y="220" font-size="14" fill="#D4AF37" text-anchor="middle">Axios</text>
  
  <!-- API Box -->
  <rect x="450" y="100" width="300" height="200" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="600" y="130" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">API Layer</text>
  <text x="600" y="160" font-size="14" fill="#D4AF37" text-anchor="middle">Express.js</text>
  <text x="600" y="180" font-size="14" fill="#D4AF37" text-anchor="middle">REST API</text>
  <text x="600" y="200" font-size="14" fill="#D4AF37" text-anchor="middle">Socket.IO Server</text>
  <text x="600" y="220" font-size="14" fill="#D4AF37" text-anchor="middle">JWT Auth</text>
  
  <!-- Database Box -->
  <rect x="850" y="100" width="300" height="200" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="1000" y="130" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Database</text>
  <text x="1000" y="160" font-size="14" fill="#D4AF37" text-anchor="middle">MongoDB</text>
  <text x="1000" y="180" font-size="14" fill="#D4AF37" text-anchor="middle">Redis (Cache)</text>
  <text x="1000" y="200" font-size="14" fill="#D4AF37" text-anchor="middle">GridFS (Files)</text>
  
  <!-- Services Box -->
  <rect x="50" y="400" width="300" height="200" fill="#0099D8" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="200" y="430" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Services</text>
  <text x="200" y="460" font-size="14" fill="#fff" text-anchor="middle">Email Service</text>
  <text x="200" y="480" font-size="14" fill="#fff" text-anchor="middle">Payment (Stripe)</text>
  <text x="200" y="500" font-size="14" fill="#fff" text-anchor="middle">Maps API</text>
  <text x="200" y="520" font-size="14" fill="#fff" text-anchor="middle">SMS Service</text>
  
  <!-- Security Box -->
  <rect x="450" y="400" width="300" height="200" fill="#0099D8" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="600" y="430" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Security</text>
  <text x="600" y="460" font-size="14" fill="#fff" text-anchor="middle">Helmet</text>
  <text x="600" y="480" font-size="14" fill="#fff" text-anchor="middle">Rate Limiting</text>
  <text x="600" y="500" font-size="14" fill="#fff" text-anchor="middle">XSS Protection</text>
  <text x="600" y="520" font-size="14" fill="#fff" text-anchor="middle">CORS</text>
  
  <!-- Monitoring Box -->
  <rect x="850" y="400" width="300" height="200" fill="#0099D8" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="1000" y="430" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Monitoring</text>
  <text x="1000" y="460" font-size="14" fill="#fff" text-anchor="middle">Winston Logging</text>
  <text x="1000" y="480" font-size="14" fill="#fff" text-anchor="middle">Health Checks</text>
  <text x="1000" y="500" font-size="14" fill="#fff" text-anchor="middle">Error Tracking</text>
  <text x="1000" y="520" font-size="14" fill="#fff" text-anchor="middle">Analytics</text>
  
  <!-- Arrows -->
  <line x1="350" y1="200" x2="450" y2="200" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="750" y1="200" x2="850" y2="200" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow Definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4AF37"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="50" y="700" width="1100" height="80" fill="#2a2a4e" rx="10"/>
  <text x="600" y="730" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Legend</text>
  <rect x="200" y="745" width="20" height="20" fill="#003D5C"/>
  <text x="230" y="760" font-size="14" fill="#fff">Core Components</text>
  <rect x="400" y="745" width="20" height="20" fill="#0099D8"/>
  <text x="430" y="760" font-size="14" fill="#fff">Supporting Services</text>
  <rect x="650" y="745" width="20" height="20" fill="#D4AF37"/>
  <text x="680" y="760" font-size="14" fill="#fff">Data Flow</text>
</svg>
