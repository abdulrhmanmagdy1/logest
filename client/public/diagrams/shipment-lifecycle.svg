<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="500" y="40" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">
    Shipment Lifecycle - دورة حياة الشحنة
  </text>
  
  <!-- Step 1: Pending -->
  <circle cx="100" cy="150" r="50" fill="#FFA500" stroke="#D4AF37" stroke-width="3"/>
  <text x="100" y="155" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">قيد الانتظار</text>
  
  <!-- Arrow 1 -->
  <line x1="150" y1="150" x2="200" y2="150" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Processing -->
  <circle cx="250" cy="150" r="50" fill="#0099D8" stroke="#D4AF37" stroke-width="3"/>
  <text x="250" y="155" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">التجهيز</text>
  
  <!-- Arrow 2 -->
  <line x1="300" y1="150" x2="350" y2="150" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Assigned -->
  <circle cx="400" cy="150" r="50" fill="#0099D8" stroke="#D4AF37" stroke-width="3"/>
  <text x="400" y="155" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">مُسندة</text>
  
  <!-- Arrow 3 -->
  <line x1="450" y1="150" x2="500" y2="150" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Step 4: In Transit -->
  <circle cx="550" cy="150" r="50" fill="#9333EA" stroke="#D4AF37" stroke-width="3"/>
  <text x="550" y="155" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">في الطريق</text>
  
  <!-- Arrow 4 -->
  <line x1="600" y1="150" x2="650" y2="150" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Step 5: Delivered -->
  <circle cx="700" cy="150" r="50" fill="#22C55E" stroke="#D4AF37" stroke-width="3"/>
  <text x="700" y="155" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">تم التسليم</text>
  
  <!-- Branch: Cancelled -->
  <line x1="250" y1="200" x2="250" y2="280" stroke="#EF4444" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="250" cy="330" r="50" fill="#EF4444" stroke="#D4AF37" stroke-width="3"/>
  <text x="250" y="335" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">ملغاة</text>
  
  <!-- Branch: Delayed -->
  <line x1="550" y1="200" x2="550" y2="280" stroke="#6B7280" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="550" cy="330" r="50" fill="#6B7280" stroke="#D4AF37" stroke-width="3"/>
  <text x="550" y="335" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">مؤجلة</text>
  
  <!-- Legend -->
  <rect x="50" y="450" width="900" height="120" fill="#2a2a4e" rx="10"/>
  <text x="500" y="480" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">الحالات</text>
  
  <circle cx="150" cy="510" r="15" fill="#FFA500"/>
  <text x="175" y="515" font-size="14" fill="#fff">قيد الانتظار</text>
  
  <circle cx="300" cy="510" r="15" fill="#0099D8"/>
  <text x="325" y="515" font-size="14" fill="#fff">التجهيز/مُسندة</text>
  
  <circle cx="450" cy="510" r="15" fill="#9333EA"/>
  <text x="475" y="515" font-size="14" fill="#fff">في الطريق</text>
  
  <circle cx="600" cy="510" r="15" fill="#22C55E"/>
  <text x="625" y="515" font-size="14" fill="#fff">تم التسليم</text>
  
  <circle cx="750" cy="510" r="15" fill="#EF4444"/>
  <text x="775" y="515" font-size="14" fill="#fff">ملغاة</text>
  
  <circle cx="150" cy="545" r="15" fill="#6B7280"/>
  <text x="175" y="550" font-size="14" fill="#fff">مؤجلة</text>
  
  <line x1="300" y1="545" x2="350" y2="545" stroke="#D4AF37" stroke-width="3"/>
  <text x="360" y="550" font-size="14" fill="#fff">التدفق الطبيعي</text>
  
  <line x1="500" y1="545" x2="550" y2="545" stroke="#EF4444" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="560" y="550" font-size="14" fill="#fff">حالات خاصة</text>
  
  <!-- Arrow Definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4AF37"/>
    </marker>
  </defs>
</svg>
