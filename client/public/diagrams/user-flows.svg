<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="600" y="40" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">
    User Flows - مسارات المستخدمين
  </text>
  
  <!-- Admin Flow -->
  <rect x="50" y="100" width="300" height="300" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="200" y="130" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">المشرف (Admin)</text>
  <rect x="80" y="150" width="240" height="40" fill="#0099D8" rx="5"/>
  <text x="200" y="175" font-size="14" fill="#fff" text-anchor="middle">تسجيل الدخول</text>
  <line x1="200" y1="190" x2="200" y2="210" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="210" width="240" height="40" fill="#0099D8" rx="5"/>
  <text x="200" y="235" font-size="14" fill="#fff" text-anchor="middle">لوحة التحكم</text>
  <line x1="200" y1="250" x2="200" y2="270" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="270" width="240" height="40" fill="#0099D8" rx="5"/>
  <text x="200" y="295" font-size="14" fill="#fff" text-anchor="middle">إدارة الشحنات</text>
  <line x1="200" y1="310" x2="200" y2="330" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="330" width="240" height="40" fill="#0099D8" rx="5"/>
  <text x="200" y="355" font-size="14" fill="#fff" text-anchor="middle">إدارة المستخدمين</text>
  
  <!-- Client Flow -->
  <rect x="400" y="100" width="300" height="300" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="550" y="130" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">العميل (Client)</text>
  <rect x="430" y="150" width="240" height="40" fill="#9333EA" rx="5"/>
  <text x="550" y="175" font-size="14" fill="#fff" text-anchor="middle">تسجيل الدخول</text>
  <line x1="550" y1="190" x2="550" y2="210" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="430" y="210" width="240" height="40" fill="#9333EA" rx="5"/>
  <text x="550" y="235" font-size="14" fill="#fff" text-anchor="middle">إنشاء شحنة</text>
  <line x1="550" y1="250" x2="550" y2="270" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="430" y="270" width="240" height="40" fill="#9333EA" rx="5"/>
  <text x="550" y="295" font-size="14" fill="#fff" text-anchor="middle">تتبع الشحنة</text>
  <line x1="550" y1="310" x2="550" y2="330" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="430" y="330" width="240" height="40" fill="#9333EA" rx="5"/>
  <text x="550" y="355" font-size="14" fill="#fff" text-anchor="middle">دفع الفاتورة</text>
  
  <!-- Driver Flow -->
  <rect x="750" y="100" width="300" height="300" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="900" y="130" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">السائق (Driver)</text>
  <rect x="780" y="150" width="240" height="40" fill="#22C55E" rx="5"/>
  <text x="900" y="175" font-size="14" fill="#fff" text-anchor="middle">تسجيل الدخول</text>
  <line x1="900" y1="190" x2="900" y2="210" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="780" y="210" width="240" height="40" fill="#22C55E" rx="5"/>
  <text x="900" y="235" font-size="14" fill="#fff" text-anchor="middle">عرض الرحلات</text>
  <line x1="900" y1="250" x2="900" y2="270" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="780" y="270" width="240" height="40" fill="#22C55E" rx="5"/>
  <text x="900" y="295" font-size="14" fill="#fff" text-anchor="middle">تحديث الموقع</text>
  <line x1="900" y1="310" x2="900" y2="330" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="780" y="330" width="240" height="40" fill="#22C55E" rx="5"/>
  <text x="900" y="355" font-size="14" fill="#fff" text-anchor="middle">إكمال الرحلة</text>
  
  <!-- Accountant Flow -->
  <rect x="50" y="450" width="300" height="300" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="200" y="480" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">المحاسب (Accountant)</text>
  <rect x="80" y="500" width="240" height="40" fill="#FFA500" rx="5"/>
  <text x="200" y="525" font-size="14" fill="#fff" text-anchor="middle">تسجيل الدخول</text>
  <line x1="200" y1="540" x2="200" y2="560" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="560" width="240" height="40" fill="#FFA500" rx="5"/>
  <text x="200" y="585" font-size="14" fill="#fff" text-anchor="middle">عرض الفواتير</text>
  <line x1="200" y1="600" x2="200" y2="620" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="620" width="240" height="40" fill="#FFA500" rx="5"/>
  <text x="200" y="645" font-size="14" fill="#fff" text-anchor="middle">تسجيل الدفعات</text>
  <line x1="200" y1="660" x2="200" y2="680" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="680" width="240" height="40" fill="#FFA500" rx="5"/>
  <text x="200" y="705" font-size="14" fill="#fff" text-anchor="middle">التقارير المالية</text>
  
  <!-- Maintenance Flow -->
  <rect x="400" y="450" width="300" height="300" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="550" y="480" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">الصيانة (Maintenance)</text>
  <rect x="430" y="500" width="240" height="40" fill="#EF4444" rx="5"/>
  <text x="550" y="525" font-size="14" fill="#fff" text-anchor="middle">تسجيل الدخول</text>
  <line x1="550" y1="540" x2="550" y2="560" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="430" y="560" width="240" height="40" fill="#EF4444" rx="5"/>
  <text x="550" y="585" font-size="14" fill="#fff" text-anchor="middle">جدولة الصيانة</text>
  <line x1="550" y1="600" x2="550" y2="620" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="430" y="620" width="240" height="40" fill="#EF4444" rx="5"/>
  <text x="550" y="645" font-size="14" fill="#fff" text-anchor="middle">جدول الزيوت</text>
  <line x1="550" y1="660" x2="550" y2="680" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="430" y="680" width="240" height="40" fill="#EF4444" rx="5"/>
  <text x="550" y="705" font-size="14" fill="#fff" text-anchor="middle">إدارة قطع الغيار</text>
  
  <!-- Legend -->
  <rect x="750" y="450" width="300" height="300" fill="#2a2a4e" rx="10"/>
  <text x="900" y="480" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">دليل الألوان</text>
  
  <rect x="770" y="500" width="30" height="30" fill="#0099D8"/>
  <text x="810" y="520" font-size="14" fill="#fff">المشرف</text>
  
  <rect x="770" y="540" width="30" height="30" fill="#9333EA"/>
  <text x="810" y="560" font-size="14" fill="#fff">العميل</text>
  
  <rect x="770" y="580" width="30" height="30" fill="#22C55E"/>
  <text x="810" y="600" font-size="14" fill="#fff">السائق</text>
  
  <rect x="770" y="620" width="30" height="30" fill="#FFA500"/>
  <text x="810" y="640" font-size="14" fill="#fff">المحاسب</text>
  
  <rect x="770" y="660" width="30" height="30" fill="#EF4444"/>
  <text x="810" y="680" font-size="14" fill="#fff">الصيانة</text>
  
  <!-- Arrow Definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4AF37"/>
    </marker>
  </defs>
</svg>
