<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="700" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="500" y="40" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">
    Data Flow - تدفق البيانات
  </text>
  
  <!-- Client -->
  <rect x="50" y="100" width="200" height="100" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="150" y="140" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">العميل</text>
  <text x="150" y="165" font-size="12" fill="#D4AF37" text-anchor="middle">Web/Mobile App</text>
  
  <!-- API Gateway -->
  <rect x="350" y="100" width="200" height="100" fill="#0099D8" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="450" y="140" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">API Gateway</text>
  <text x="450" y="165" font-size="12" fill="#fff" text-anchor="middle">Express.js</text>
  
  <!-- Auth Service -->
  <rect x="650" y="80" width="150" height="70" fill="#FFA500" rx="8" stroke="#D4AF37" stroke-width="2"/>
  <text x="725" y="110" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">المصادقة</text>
  <text x="725" y="130" font-size="11" fill="#fff" text-anchor="middle">JWT</text>
  
  <!-- Shipment Service -->
  <rect x="650" y="170" width="150" height="70" fill="#9333EA" rx="8" stroke="#D4AF37" stroke-width="2"/>
  <text x="725" y="200" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">الشحنات</text>
  <text x="725" y="220" font-size="11" fill="#fff" text-anchor="middle">CRUD</text>
  
  <!-- Database -->
  <rect x="350" y="300" width="200" height="120" fill="#22C55E" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="450" y="340" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">قاعدة البيانات</text>
  <text x="450" y="365" font-size="12" fill="#fff" text-anchor="middle">MongoDB</text>
  <text x="450" y="385" font-size="12" fill="#fff" text-anchor="middle">Users, Shipments</text>
  <text x="450" y="405" font-size="12" fill="#fff" text-anchor="middle">Trucks, Invoices</text>
  
  <!-- Redis Cache -->
  <rect x="650" y="300" width="150" height="70" fill="#EF4444" rx="8" stroke="#D4AF37" stroke-width="2"/>
  <text x="725" y="330" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Redis</text>
  <text x="725" y="350" font-size="11" fill="#fff" text-anchor="middle">Cache</text>
  
  <!-- Socket.IO -->
  <rect x="50" y="300" width="150" height="70" fill="#0099D8" rx="8" stroke="#D4AF37" stroke-width="2"/>
  <text x="125" y="330" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Socket.IO</text>
  <text x="125" y="350" font-size="11" fill="#fff" text-anchor="middle">Real-time</text>
  
  <!-- External Services -->
  <rect x="50" y="450" width="200" height="100" fill="#6B7280" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="150" y="485" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">خدمات خارجية</text>
  <text x="150" y="505" font-size="11" fill="#fff" text-anchor="middle">Stripe, Maps, Email</text>
  
  <!-- Monitoring -->
  <rect x="350" y="450" width="200" height="100" fill="#6B7280" rx="10" stroke="#D4AF37" stroke-width="2"/>
  <text x="450" y="485" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">المراقبة</text>
  <text x="450" y="505" font-size="11" fill="#fff" text-anchor="middle">Winston, Analytics</text>
  
  <!-- Arrows -->
  <line x1="250" y1="150" x2="350" y2="150" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="550" y1="150" x2="650" y2="115" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="150" x2="650" y2="205" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="200" x2="450" y2="300" stroke="#D4AF37" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="550" y1="360" x2="650" y2="335" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="150" y1="200" x2="150" y2="300" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="150" y1="370" x2="150" y2="450" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="420" x2="450" y2="450" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Arrow Definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4AF37"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="650" y="450" width="300" height="200" fill="#2a2a4e" rx="10"/>
  <text x="800" y="480" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">الشرح</text>
  
  <rect x="670" y="500" width="20" height="20" fill="#003D5C"/>
  <text x="700" y="515" font-size="12" fill="#fff">العميل</text>
  
  <rect x="670" y="530" width="20" height="20" fill="#0099D8"/>
  <text x="700" y="545" font-size="12" fill="#fff">API / Socket.IO</text>
  
  <rect x="670" y="560" width="20" height="20" fill="#22C55E"/>
  <text x="700" y="575" font-size="12" fill="#fff">قاعدة البيانات</text>
  
  <rect x="670" y="590" width="20" height="20" fill="#FFA500"/>
  <text x="700" y="605" font-size="12" fill="#fff">الخدمات</text>
  
  <rect x="670" y="620" width="20" height="20" fill="#6B7280"/>
  <text x="700" y="635" font-size="12" fill="#fff">خارجي/مراقبة</text>
</svg>
