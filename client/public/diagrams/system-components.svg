<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="800" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="500" y="40" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">
    System Components - مكونات النظام
  </text>
  
  <!-- Core System -->
  <rect x="50" y="80" width="900" height="250" fill="#003D5C" rx="10" stroke="#D4AF37" stroke-width="3"/>
  <text x="500" y="110" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">النظام الأساسي</text>
  
  <!-- Server -->
  <rect x="80" y="130" width="180" height="80" fill="#0099D8" rx="8"/>
  <text x="170" y="160" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">الخادم</text>
  <text x="170" y="180" font-size="12" fill="#fff" text-anchor="middle">Node.js + Express</text>
  
  <!-- Database -->
  <rect x="280" y="130" width="180" height="80" fill="#0099D8" rx="8"/>
  <text x="370" y="160" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">قاعدة البيانات</text>
  <text x="370" y="180" font-size="12" fill="#fff" text-anchor="middle">MongoDB</text>
  
  <!-- Cache -->
  <rect x="480" y="130" width="180" height="80" fill="#0099D8" rx="8"/>
  <text x="570" y="160" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">التخزين المؤقت</text>
  <text x="570" y="180" font-size="12" fill="#fff" text-anchor="middle">Redis</text>
  
  <!-- Socket -->
  <rect x="680" y="130" width="180" height="80" fill="#0099D8" rx="8"/>
  <text x="770" y="160" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">اتصال فوري</text>
  <text x="770" y="180" font-size="12" fill="#fff" text-anchor="middle">Socket.IO</text>
  
  <!-- Frontend -->
  <rect x="80" y="230" width="180" height="80" fill="#0099D8" rx="8"/>
  <text x="170" y="260" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">الواجهة</text>
  <text x="170" y="280" font-size="12" fill="#fff" text-anchor="middle">React 18</text>
  
  <!-- Auth -->
  <rect x="280" y="230" width="180" height="80" fill="#0099D8" rx="8"/>
  <text x="370" y="260" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">المصادقة</text>
  <text x="370" y="280" font-size="12" fill="#fff" text-anchor="middle">JWT</text>
  
  <!-- API -->
  <rect x="480" y="230" width="180" height="80" fill="#0099D8" rx="8"/>
  <text x="570" y="260" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">REST API</text>
  <text x="570" y="280" font-size="12" fill="#fff" text-anchor="middle">Express Routes</text>
  
  <!-- Security -->
  <rect x="680" y="230" width="180" height="80" fill="#0099D8" rx="8"/>
  <text x="770" y="260" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">الأمان</text>
  <text x="770" y="280" font-size="12" fill="#fff" text-anchor="middle">Helmet + CORS</text>
  
  <!-- External Services -->
  <rect x="50" y="360" width="900" height="200" fill="#9333EA" rx="10" stroke="#D4AF37" stroke-width="3"/>
  <text x="500" y="390" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">الخدمات الخارجية</text>
  
  <!-- Stripe -->
  <rect x="80" y="410" width="180" height="80" fill="#FFA500" rx="8"/>
  <text x="170" y="445" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">الدفع</text>
  <text x="170" y="465" font-size="12" fill="#fff" text-anchor="middle">Stripe</text>
  
  <!-- Maps -->
  <rect x="280" y="410" width="180" height="80" fill="#FFA500" rx="8"/>
  <text x="370" y="445" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">الخرائط</text>
  <text x="370" y="465" font-size="12" fill="#fff" text-anchor="middle">Google Maps</text>
  
  <!-- Email -->
  <rect x="480" y="410" width="180" height="80" fill="#FFA500" rx="8"/>
  <text x="570" y="445" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">البريد</text>
  <text x="570" y="465" font-size="12" fill="#fff" text-anchor="middle">Nodemailer</text>
  
  <!-- SMS -->
  <rect x="680" y="410" width="180" height="80" fill="#FFA500" rx="8"/>
  <text x="770" y="445" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">الرسائل</text>
  <text x="770" y="465" font-size="12" fill="#fff" text-anchor="middle">SMS Service</text>
  
  <!-- Monitoring & Analytics -->
  <rect x="50" y="590" width="900" height="200" fill="#22C55E" rx="10" stroke="#D4AF37" stroke-width="3"/>
  <text x="500" y="620" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">المراقبة والتحليلات</text>
  
  <!-- Logging -->
  <rect x="80" y="640" width="180" height="80" fill="#6B7280" rx="8"/>
  <text x="170" y="675" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">التسجيل</text>
  <text x="170" y="695" font-size="12" fill="#fff" text-anchor="middle">Winston</text>
  
  <!-- Analytics -->
  <rect x="280" y="640" width="180" height="80" fill="#6B7280" rx="8"/>
  <text x="370" y="675" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">التحليلات</text>
  <text x="370" y="695" font-size="12" fill="#fff" text-anchor="middle">Custom Dashboard</text>
  
  <!-- Health Checks -->
  <rect x="480" y="640" width="180" height="80" fill="#6B7280" rx="8"/>
  <text x="570" y="675" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">فحص الصحة</text>
  <text x="570" y="695" font-size="12" fill="#fff" text-anchor="middle">/api/health</text>
  
  <!-- Error Tracking -->
  <rect x="680" y="640" width="180" height="80" fill="#6B7280" rx="8"/>
  <text x="770" y="675" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">تتبع الأخطاء</text>
  <text x="770" y="695" font-size="12" fill="#fff" text-anchor="middle">Error Handler</text>
</svg>
