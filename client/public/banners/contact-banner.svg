<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="contactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003D5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#contactGrad)"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="60" fill="#fff" opacity="0.1"/>
  <circle cx="1100" cy="300" r="80" fill="#fff" opacity="0.1"/>
  
  <!-- Text -->
  <text x="600" y="180" font-size="56" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif">
    تواصل معنا
  </text>
  
  <text x="600" y="240" font-size="24" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif">
    نسعد بخدمتكم على مدار الساعة
  </text>
</svg>
