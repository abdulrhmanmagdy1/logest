<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003D5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099D8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#heroGrad)"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="50" r="80" fill="#D4AF37" opacity="0.1"/>
  <circle cx="1100" cy="350" r="120" fill="#D4AF37" opacity="0.1"/>
  
  <!-- Text -->
  <text x="600" y="180" font-size="64" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif">
    إدهام للخدمات اللوجستية
  </text>
  
  <text x="600" y="240" font-size="28" fill="#D4AF37" text-anchor="middle" font-family="Arial, sans-serif">
    نظام متكامل لإدارة الشحنات والنقل المبرد
  </text>
</svg>
