<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="aboutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0099D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D5C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#aboutGrad)"/>
  
  <!-- Decorative Elements -->
  <circle cx="200" cy="200" r="150" fill="#D4AF37" opacity="0.05"/>
  <circle cx="1000" cy="200" r="100" fill="#D4AF37" opacity="0.05"/>
  
  <!-- Text -->
  <text x="600" y="180" font-size="56" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif">
    عن إدهام
  </text>
  
  <text x="600" y="240" font-size="24" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif">
    شريكك الموثوق في الخدمات اللوجستية والنقل المبرد
  </text>
</svg>
