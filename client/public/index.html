<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e3a8a" />
  <meta name="description" content="نظام إدهام اللوجستي المتكامل - تطبيق احترافي لإدارة الأسطول والشحنات" />
  <meta name="keywords" content="لوجستيات, شحنات, أسطول, تتبع, إدهام, نظام لوجستي" />
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="نظام إدهام اللوجستي المتكامل" />
  <meta property="og:description" content="تطبيق احترافي لإدارة الأسطول والشحنات مع تتبع مباشر" />
  <meta property="og:image" href="%PUBLIC_URL%/edham-logo.png" />
  <meta property="og:type" content="website" />
  
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="نظام إدهام اللوجستي المتكامل" />
  <meta name="twitter:description" content="تطبيق احترافي لإدارة الأسطول والشحنات مع تتبع مباشر" />
  <meta name="twitter:image" href="%PUBLIC_URL%/edham-logo.png" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Professional Theme CSS -->
  <link rel="stylesheet" href="%PUBLIC_URL%/styles/Theme.css" />
  
  <title>نظام إدهام اللوجستي المتكامل</title>
  
  <style>
    /* Professional Loading Screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1e3a8a 0%, #2d5a8d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Cairo', sans-serif;
    }
    
    .loading-content {
      text-align: center;
      color: white;
    }
    
    .loading-logo {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: float 3s ease-in-out infinite;
    }
    
    .loading-logo::before {
      content: '🚛️';
      font-size: 40px;
    }
    
    .loading-text {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }
    
    .loading-subtitle {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Hide loading screen when app loads */
    .app-loaded .loading-screen {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
  </style>
</head>
<body data-theme="light">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  
  <!-- Professional Loading Screen -->
  <div class="loading-screen">
    <div class="loading-content">
      <div class="loading-logo"></div>
      <div class="loading-text">نظام إدهام اللوجستي</div>
      <div class="loading-subtitle">تطبيق احترافي لإدارة الأسطول والشحنات</div>
      <div class="loading-spinner"></div>
    </div>
  </div>
  
  <!-- React App Root -->
  <div id="root"></div>
  
  <script>
    // Remove loading screen when app loads
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.body.classList.add('app-loaded');
      }, 1000);
    });
    
    // Set theme based on user preference or system
    const savedTheme = localStorage.getItem('edham-theme') || 'light';
    document.body.setAttribute('data-theme', savedTheme);
    
    // Theme toggle functionality
    function toggleTheme() {
      const currentTheme = document.body.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.body.setAttribute('data-theme', newTheme);
      localStorage.setItem('edham-theme', newTheme);
    }
    
    // Make theme toggle globally available
    window.toggleTheme = toggleTheme;
  </script>
</body>
</html>
